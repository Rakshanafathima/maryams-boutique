<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maryam's Boutique City</title>
<style>
body{font-family:'Arial',sans-serif;margin:0;background:#fff0f5;}
header{background:linear-gradient(90deg,#ff4da6,#ffc0cb);color:white;padding:30px;text-align:center;font-size:32px;font-weight:bold;}
nav{text-align:center;margin:15px 0;}
nav button{background:#ff99c8;border:none;padding:10px 15px;margin:5px;border-radius:20px;cursor:pointer;color:white;font-weight:bold;}
.products{display:flex;flex-wrap:wrap;justify-content:center;padding:20px;}
.card{background:white;width:230px;margin:15px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);overflow:hidden;transition: transform 0.3s;}
.card:hover{transform: scale(1.05);}
.card img{width:100%;height:200px;object-fit:cover;}
.card h3{margin:10px 0 5px 0;color:#e60073;}
.card p{margin:5px 0;color:#333;}
.card select{width:80%;margin:5px 10%;padding:7px;border-radius:5px;border:1px solid #ccc;}
.card a button{background:#25D366;width:90%;margin:10px 5%;padding:10px;border:none;border-radius:5px;color:white;font-size:16px;cursor:pointer;}
footer{background:linear-gradient(90deg,#ff4da6,#ffc0cb);color:white;text-align:center;padding:20px;margin-top:30px;}
@media(max-width:600px){.products{flex-direction:column;align-items:center;}.card{width:90%;}}
</style>
</head>
<body>

<header>Maryam's Boutique City</header>

<nav>
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Women Clothing')">Women Clothing</button>
<button onclick="filterCategory('Beauty & Personal Care')">Beauty & Personal Care</button>
<button onclick="filterCategory('Kids Wear')">Kids Wear</button>
<button onclick="filterCategory('Accessories')">Accessories</button>
<button onclick="filterCategory('Footwear')">Footwear</button>
<button onclick="filterCategory('Home & Lifestyle')">Home & Lifestyle</button>
</nav>

<div class="products">

<!-- Sample Product Cards (repeat similar blocks for 100+ products) -->

<div class="card" data-category="Women Clothing">
<img src="images/women1.jpg" alt="Elegant Dress">
<h3>Elegant Dress</h3>
<p>Price: Rs 2500</p>
<select class="qty"><option value="1">Qty: 1</option><option value="2">Qty: 2</option></select>
<select class="color"><option value="Red">Red</option><option value="Blue">Blue</option></select>
<a href="#" class="wa-link"><button>Order on WhatsApp</button></a>
</div>

<div class="card" data-category="Beauty & Personal Care">
<img src="images/beauty1.jpg" alt="Facial Kit">
<h3>Facial Kit</h3>
<p>Price: Rs 1200</p>
<select class="qty"><option value="1">Qty: 1</option><option value="2">Qty: 2</option></select>
<select class="color"><option value="Default">Default</option></select>
<a href="#" class="wa-link"><button>Order on WhatsApp</button></a>
</div>

<div class="card" data-category="Kids Wear">
<img src="images/kids1.jpg" alt="Kids Dress">
<h3>Kids Dress</h3>
<p>Price: Rs 900</p>
<select class="qty"><option value="1">Qty: 1</option><option value="2">Qty: 2</option></select>
<select class="color"><option value="Pink">Pink</option><option value="Blue">Blue</option></select>
<a href="#" class="wa-link"><button>Order on WhatsApp</button></a>
</div>

<div class="card" data-category="Accessories">
<img src="images/accessories1.jpg" alt="Velvet Bangles">
<h3>Velvet Bangles</h3>
<p>Price: Rs 1200</p>
<select class="qty"><option value="1">Qty: 1</option><option value="2">Qty: 2</option></select>
<select class="color"><option value="Red">Red</option><option value="Green">Green</option></select>
<a href="#" class="wa-link"><button>Order on WhatsApp</button></a>
</div>

<div class="card" data-category="Footwear">
<img src="images/footwear1.jpg" alt="Stylish Shoes">
<h3>Stylish Shoes</h3>
<p>Price: Rs 1800</p>
<select class="qty"><option value="1">Qty: 1</option><option value="2">Qty: 2</option></select>
<select class="color"><option value="Black">Black</option><option value="Brown">Brown</option></select>
<a href="#" class="wa-link"><button>Order on WhatsApp</button></a>
</div>

<div class="card" data-category="Home & Lifestyle">
<img src="images/home1.jpg" alt="Decor Set">
<h3>Decor Set</h3>
<p>Price: Rs 1500</p>
<select class="qty"><option value="1">Qty: 1</option><option value="2">Qty: 2</option></select>
<select class="color"><option value="Default">Default</option></select>
<a href="#" class="wa-link"><button>Order on WhatsApp</button></a>
</div>

<!-- Repeat blocks for 100+ products here -->

</div>

<footer>Maryam's Boutique City | WhatsApp Orders: 0778659555</footer>

<script>
function filterCategory(cat){
let cards=document.querySelectorAll('.card');
cards.forEach(card=>{
if(cat==='All'||card.getAttribute('data-category')===cat){card.style.display='block';}else{card.style.display='none';}
});
}

// WhatsApp auto message
document.querySelectorAll('.wa-link').forEach(link=>{
link.addEventListener('click',function(e){
e.preventDefault();
let card=link.closest('.card');
let product=card.querySelector('h3').innerText;
let qty=card.querySelector('.qty').value;
let color=card.querySelector('.color').value;
let msg=`Hello Maryam's Boutique City, I want to order:\nProduct: ${product}\nQuantity: ${qty}\nColor: ${color}`;
let waNumber="94778659555";
window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`,'_blank');
});
});
</script>

</body>
</html>
