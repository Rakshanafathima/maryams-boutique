<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maryam's Boutique City</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Maryam's Boutique Logo" class="logo">
            <p class="tagline">Elegant Fashion for Every Woman</p>
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to <br><span>Maryam's Boutique City</span></h1>
            <p>Beautiful Styles for Every Woman</p>
        </div>
        <div class="hero-image">
            <img src="hero-woman.png" alt="Featured Fashion">
        </div>
    </section>

    <section class="shop-collection">
        <h2>Shop Our Collection</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="bangles.jpg" alt="Velvet Bangles">
                <h3>Velvet Bangles Pack</h3>
                <p class="price">Rs 1200</p>
                <button class="add-to-cart">Add to Cart</button>
            </div>
            </div>
    </section>

</body>
</html>
:root {
    --primary-pink: #f9d5e5;
    --dark-pink: #c2185b;
    --text-color: #4a4a4a;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background-color: #fffafb;
    color: var(--text-color);
}

/* Header Styling */
header {
    text-align: center;
    padding: 20px 0;
    background: white;
}

.logo { width: 150px; }

nav ul {
    list-style: none;
    padding: 0;
    display: flex;
    justify-content: center;
    gap: 30px;
    border-top: 1px solid #eee;
    padding-top: 10px;
}

nav a {
    text-decoration: none;
    color: var(--text-color);
    font-weight: 400;
}

/* Hero Section */
.hero {
    display: flex;
    align-items: center;
    background: linear-gradient(to right, #fdf0f5, #f9d5e5);
    padding: 40px 10%;
    min-height: 400px;
}

.hero-content h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: var(--dark-pink);
}

.hero-content span { font-style: italic; }

.hero-image img {
    max-width: 100%;
    height: auto;
}

/* Product Grid */
.shop-collection {
    padding: 50px 10%;
    text-align: center;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.product-card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: transform 0.3s;
}

.product-card:hover { transform: translateY(-5px); }

.product-card img {
    width: 100%;
    border-radius: 5px;
}

.add-to-cart {
    background-color: var(--dark-pink);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
}

.add-to-cart:hover { background-color: #a0134d; }
