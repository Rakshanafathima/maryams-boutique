<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maryam's Boutique City</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#fff5f7;
}

/* HEADER */

header{
background:#ffd6de;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#c94c6b;
}

nav a{
margin:0 10px;
text-decoration:none;
color:#333;
font-weight:500;
}

/* HERO */

.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:60px;
background:linear-gradient(#ffd6de,#fff);
}

.hero h1{
color:#c94c6b;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.product{
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
padding:15px;
text-align:center;
}

.product img{
width:100%;
border-radius:10px;
}

.price{
color:#c94c6b;
font-weight:bold;
}

button{
background:#e85d75;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

/* CONTACT */

.contact{
text-align:center;
padding:40px;
background:#ffd6de;
}

.whatsapp{
background:#25D366;
margin-top:10px;
}

</style>
</head>

<body>

<header>
<h2>Maryam's Boutique City</h2>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<div>
<h1>Welcome to Maryam's Boutique</h1>
<p>Beautiful Styles for Every Woman</p>
</div>

<img src="https://images.unsplash.com/photo-1520975922284-1c1c6f9c8f3e?w=400">

</section>


<section class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1588117260148-b47818741c74?w=400">
<h3>Floral Dress</h3>
<p class="price">Rs 3200</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1596755389378-c31d21fd1273?w=400">
<h3>Velvet Bangles</h3>
<p class="price">Rs 1200</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1583001931096-959e9a1a6223?w=400">
<h3>Hair Scrunchies</h3>
<p class="price">Rs 1500</p>
<button>Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1585487000160-6ebcfceb0d03?w=400">
<h3>Lace Bralette</h3>
<p class="price">Rs 1500</p>
<button>Add to Cart</button>
</div>

</section>


<section class="contact">

<h2>WhatsApp Orders</h2>

<p>+94 778659555</p>

<a href="https://wa.me/94778659555">
<button class="whatsapp">Order on WhatsApp</button>
</a>

<p>Location : Sri Lanka</p>

</section>


</body>
</html>
